services:
  api:
    build: .
    container_name: task-notes-api
    ports:
      - '${API_HOST_PORT-3000}:${API_CONTAINER_PORT-3000d}'
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://localhost:${API_CONTAINER_PORT}/health || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16
    container_name: task-notes-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: tasks_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: task-notes-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
